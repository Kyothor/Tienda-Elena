<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tienda Elena</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;}
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .login-card{background:#fff;border-radius:16px;border:1px solid #e8e8e2;padding:2rem;width:100%;max-width:360px;box-shadow:0 2px 20px rgba(0,0,0,0.06);}
  .login-logo{font-size:24px;font-weight:700;color:#1a1a1a;margin-bottom:4px;}
  .login-sub{font-size:13px;color:#888;margin-bottom:1.5rem;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:#666;margin-bottom:5px;font-weight:500;}
  .field input{width:100%;padding:10px 12px;font-size:14px;border:1px solid #e0e0da;border-radius:10px;background:#fafaf8;color:#1a1a1a;outline:none;transition:border-color .2s;}
  .field input:focus{border-color:#1D9E75;}
  .btn-primary{width:100%;padding:11px;background:#1D9E75;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;}
  .btn-primary:hover{background:#0F6E56;}
  .btn-primary:disabled{background:#aaa;cursor:not-allowed;}
  .error-msg{font-size:12px;color:#c0392b;margin-top:8px;}
  .topbar{background:#fff;border-bottom:1px solid #e8e8e2;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .topbar-title{font-size:15px;font-weight:700;color:#1a1a1a;}
  .topbar-sub{font-size:11px;color:#888;margin-top:1px;}
  .btn-logout{font-size:12px;padding:6px 14px;border:1px solid #e0e0da;border-radius:8px;background:#fff;color:#666;cursor:pointer;font-weight:500;}
  .btn-logout:hover{background:#f5f5f0;}
  .content{padding:20px;max-width:720px;margin:0 auto;}
  .tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:1px solid #e8e8e2;}
  .tab{padding:9px 16px;font-size:13px;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;background:transparent;border-top:none;border-left:none;border-right:none;font-weight:500;}
  .tab.active{color:#1D9E75;border-bottom-color:#1D9E75;}
  .tab-content{display:none;}
  .tab-content.active{display:block;}
  .card{background:#fff;border:1px solid #e8e8e2;border-radius:14px;padding:1rem 1.25rem;margin-bottom:14px;}
  .metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:20px;}
  .metric{background:#fff;border:1px solid #e8e8e2;border-radius:12px;padding:14px;}
  .metric-label{font-size:11px;color:#888;margin-bottom:4px;font-weight:500;}
  .metric-val{font-size:22px;font-weight:700;color:#1a1a1a;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;padding:8px 10px;color:#888;font-weight:600;border-bottom:1px solid #e8e8e2;font-size:11px;text-transform:uppercase;letter-spacing:.3px;}
  td{padding:11px 10px;border-bottom:1px solid #f0f0ea;color:#1a1a1a;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;}
  .badge-green{background:#EAF3DE;color:#2d6a11;}
  .badge-amber{background:#FFF3DC;color:#a05c00;}
  .badge-red{background:#FDEAEA;color:#a32d2d;}
  .form-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
  .form-row .field{flex:1;margin-bottom:0;min-width:110px;}
  .btn-add{padding:10px 16px;font-size:13px;border:none;border-radius:10px;background:#1D9E75;color:#fff;cursor:pointer;font-weight:600;white-space:nowrap;}
  .btn-add:hover{background:#0F6E56;}
  .btn-add:disabled{background:#aaa;cursor:not-allowed;}
  .btn-danger{padding:5px 10px;font-size:12px;border:1px solid #f0c0c0;border-radius:8px;background:#fff;color:#c0392b;cursor:pointer;}
  .btn-danger:hover{background:#fdeaea;}
  .btn-stock{padding:4px 10px;font-size:12px;border:1px solid #e0e0da;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;}
  .btn-stock:hover{background:#f5f5f0;}
  .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
  .product-card{background:#fff;border:1px solid #e8e8e2;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;}
  .product-card.agotado{opacity:.7;}
  .product-img{width:100%;height:120px;object-fit:cover;background:#f5f5f0;}
  .product-img-placeholder{width:100%;height:120px;background:#f0f0ea;display:flex;align-items:center;justify-content:center;font-size:28px;}
  .product-info{padding:12px;display:flex;flex-direction:column;gap:4px;}
  .product-name{font-size:13px;font-weight:600;}
  .product-price{font-size:14px;color:#1D9E75;font-weight:700;}
  .product-cat{font-size:11px;color:#aaa;font-weight:500;}
  .stock-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;display:inline-block;}
  .stock-ok{background:#EAF3DE;color:#2d6a11;}
  .stock-low{background:#FFF3DC;color:#a05c00;}
  .stock-out{background:#FDEAEA;color:#a32d2d;}
  .purchase-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #f0f0ea;}
  .purchase-row:last-child{border-bottom:none;}
  .total-bar{background:#f5f5f0;border:1px solid #e8e8e2;border-radius:12px;padding:14px 1.25rem;display:flex;align-items:center;justify-content:space-between;margin-top:14px;}
  .total-label{font-size:13px;color:#666;font-weight:500;}
  .total-val{font-size:22px;font-weight:700;color:#1D9E75;}
  .initials{width:34px;height:34px;border-radius:50%;background:#E1F5EE;color:#0F6E56;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
  .alert{padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;font-weight:500;}
  .alert-success{background:#EAF3DE;color:#2d6a11;}
  .alert-error{background:#FDEAEA;color:#a32d2d;}
  .empty{font-size:13px;color:#aaa;text-align:center;padding:2.5rem;}
  .loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f5f5f0;gap:14px;}
  .spinner{width:32px;height:32px;border:3px solid #e0e0da;border-top-color:#1D9E75;border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:14px;color:#888;}
  .section-title{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:14px;}
  .client-block{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #f0f0ea;}
  .client-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
  .client-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .agotado-banner{background:#FDEAEA;color:#a32d2d;font-size:11px;font-weight:700;text-align:center;padding:4px;letter-spacing:.5px;}
  .month-selector{display:flex;align-items:center;gap:10px;margin-bottom:20px;background:#fff;border:1px solid #e8e8e2;border-radius:12px;padding:12px 16px;}
  .month-selector label{font-size:12px;color:#888;font-weight:500;white-space:nowrap;}
  .month-selector select{flex:1;padding:7px 10px;font-size:13px;border:1px solid #e0e0da;border-radius:8px;background:#fafaf8;color:#1a1a1a;outline:none;cursor:pointer;}
  .month-selector select:focus{border-color:#1D9E75;}
  .historic-badge{display:inline-block;background:#FFF3DC;color:#a05c00;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;margin-left:8px;vertical-align:middle;}
  @media(max-width:480px){
    .metrics{grid-template-columns:repeat(2,minmax(0,1fr));}
    .form-row{flex-direction:column;}
    .form-row .field{min-width:100%;}
    .btn-add{width:100%;}
  }
</style>
</head>
<body>

<div id="loading-screen" class="loading-screen">
  <div class="spinner"></div>
  <div class="loading-text">Cargando Tienda Elena...</div>
</div>

<div id="screen-login" style="display:none;">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">Tienda Elena</div>
      <div class="login-sub">Ingresa con tu cuenta</div>
      <div class="field"><label>Usuario</label><input type="text" id="login-user" placeholder="tu usuario" autocomplete="username"/></div>
      <div class="field"><label>Contraseña</label><input type="password" id="login-pass" placeholder="••••••" autocomplete="current-password"/></div>
      <div id="login-error" class="error-msg"></div>
      <button class="btn-primary" id="btn-login" onclick="doLogin()">Ingresar</button>
    </div>
  </div>
</div>

<div id="screen-admin" style="display:none;">
  <div class="topbar">
    <div>
      <div class="topbar-title">Tienda Elena — Admin</div>
      <div class="topbar-sub" id="admin-month-label"></div>
    </div>
    <button class="btn-logout" onclick="doLogout()">Cerrar sesión</button>
  </div>
  <div class="content">
    <div class="metrics" id="admin-metrics"></div>
    <div class="tabs">
      <button class="tab active" id="tbtn-clientes"  onclick="showAdminTab('clientes')">Clientes</button>
      <button class="tab"        id="tbtn-compras"   onclick="showAdminTab('compras')">Compras</button>
      <button class="tab"        id="tbtn-productos" onclick="showAdminTab('productos')">Productos</button>
    </div>

    <div id="tab-clientes" class="tab-content active">
      <!-- Selector de mes -->
      <div class="month-selector">
        <label>Ver mes:</label>
        <select id="month-select-clientes" onchange="changeViewMonth('clientes')"></select>
      </div>
      <div class="card" style="margin-bottom:14px;">
        <div class="section-title" id="clients-section-title">Clientes registrados</div>
        <div id="admin-clients-list"></div>
      </div>
      <div class="card" id="add-client-card">
        <div class="section-title">Agregar cliente</div>
        <div class="form-row">
          <div class="field"><label>Nombre completo</label><input id="nc-name" type="text" placeholder="Ej: Ana Torres"/></div>
          <div class="field"><label>Usuario</label><input id="nc-user" type="text" placeholder="ana"/></div>
          <div class="field"><label>Contraseña (mín. 6 caracteres)</label><input id="nc-pass" type="password" placeholder="clave"/></div>
          <button class="btn-add" id="btn-add-client" onclick="addClient()">+ Agregar</button>
        </div>
        <div id="add-client-msg" class="error-msg"></div>
      </div>
    </div>

    <div id="tab-compras" class="tab-content">
      <!-- Selector de mes -->
      <div class="month-selector">
        <label>Ver mes:</label>
        <select id="month-select-compras" onchange="changeViewMonth('compras')"></select>
      </div>
      <div class="card">
        <div class="section-title" id="compras-section-title">Compras del mes por cliente</div>
        <div id="admin-purchases-list"></div>
      </div>
    </div>

    <div id="tab-productos" class="tab-content">
      <div class="card" style="margin-bottom:14px;">
        <div class="section-title">Catálogo e inventario</div>
        <div id="admin-products-list"></div>
      </div>
      <div class="card">
        <div class="section-title">Agregar producto</div>
        <div class="form-row">
          <div class="field"><label>Nombre</label><input id="np-name" type="text" placeholder="Ej: Leche entera"/></div>
          <div class="field"><label>Precio ($)</label><input id="np-price" type="number" placeholder="0" min="0"/></div>
          <div class="field"><label>Categoría</label><input id="np-cat" type="text" placeholder="Ej: Lácteos"/></div>
          <div class="field"><label>Stock (unidades)</label><input id="np-stock" type="number" placeholder="0" min="0"/></div>
        </div>
        <div class="form-row" style="margin-top:10px;">
          <div class="field" style="flex:3;"><label>URL de imagen (opcional)</label><input id="np-img" type="url" placeholder="https://i.imgur.com/ejemplo.jpg"/></div>
          <button class="btn-add" id="btn-add-prod" onclick="addProduct()">+ Agregar</button>
        </div>
        <div id="add-prod-error" class="error-msg"></div>
      </div>
    </div>
  </div>
</div>

<div id="screen-cliente" style="display:none;">
  <div class="topbar">
    <div>
      <div class="topbar-title">Tienda Elena</div>
      <div class="topbar-sub" id="client-welcome"></div>
    </div>
    <button class="btn-logout" onclick="doLogout()">Cerrar sesión</button>
  </div>
  <div class="content">
    <div class="tabs">
      <button class="tab active" id="tbtn-catalogo"   onclick="showClientTab('catalogo')">Catálogo</button>
      <button class="tab"        id="tbtn-miscuentas" onclick="showClientTab('miscuentas')">Mis compras</button>
    </div>
    <div id="tab-catalogo" class="tab-content active">
      <div id="client-alert"></div>
      <div class="product-grid" id="client-product-grid"></div>
    </div>
    <div id="tab-miscuentas" class="tab-content">
      <div class="card">
        <div class="section-title" style="display:flex;justify-content:space-between;align-items:center;">
          Mis compras del mes
          <span id="client-month-badge" style="font-size:12px;color:#aaa;font-weight:400;"></span>
        </div>
        <div id="client-purchases-list"></div>
        <div class="total-bar" id="client-total-bar"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const CFG = {
  apiKey:            "AIzaSyBLaUqijK3HC2Pn3CmT6xDi96MZnp0HrJs",
  authDomain:        "tienda-elena.firebaseapp.com",
  projectId:         "tienda-elena",
  storageBucket:     "tienda-elena.firebasestorage.app",
  messagingSenderId: "1077308083283",
  appId:             "1:1077308083283:web:ecedcfbe86e61fbb870aa6"
};

const ADMIN_EMAIL   = "alezzespinoza14@gmail.com";
const CLIENT_DOMAIN = "@tienda-elena.com";

const mainApp  = firebase.initializeApp(CFG, "main");
const mainAuth = mainApp.auth();
const db       = mainApp.firestore();
const secApp   = firebase.initializeApp(CFG, "secondary");
const secAuth  = secApp.auth();

const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto',
                'Septiembre','Octubre','Noviembre','Diciembre'];
const now          = new Date();
const currentMonth = now.getMonth();
const currentYear  = now.getFullYear();
const currentMonthKey = currentYear + '-' + String(currentMonth + 1).padStart(2,'0');
const todayStr     = now.toISOString().slice(0,10);

// Mes que se está viendo en admin (puede ser histórico)
let viewMonthKey = currentMonthKey;

let currentUser     = null;
let cachedUsers     = [];
let cachedProducts  = [];
let cachedPurchases = [];   // compras del mes actual (para clientes y escritura)
let viewPurchases   = [];   // compras del mes que se está viendo en admin
let unsubPurchases  = null;
let unsubView       = null;

const fmt      = n    => '$' + Math.round(n).toLocaleString('es-CO');
const initials = name => name.trim().split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
const uid      = ()   => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const toEmail  = u    => u.includes('@') ? u : u.toLowerCase().trim() + CLIENT_DOMAIN;

function showScreen(id) {
  ['loading-screen','screen-login','screen-admin','screen-cliente'].forEach(s =>
    document.getElementById(s).style.display = 'none'
  );
  document.getElementById(id).style.display = 'block';
}

// Genera los últimos 12 meses como opciones
function buildMonthOptions() {
  const options = [];
  for (let i = 0; i < 12; i++) {
    const d = new Date(currentYear, currentMonth - i, 1);
    const y = d.getFullYear();
    const m = d.getMonth();
    const key = y + '-' + String(m + 1).padStart(2,'0');
    const label = MONTHS[m] + ' ' + y + (i === 0 ? ' (mes actual)' : '');
    options.push({key, label});
  }
  return options;
}

function populateMonthSelectors() {
  const options = buildMonthOptions();
  ['month-select-clientes','month-select-compras'].forEach(selId => {
    const sel = document.getElementById(selId);
    sel.innerHTML = options.map(o =>
      `<option value="${o.key}" ${o.key===viewMonthKey?'selected':''}>${o.label}</option>`
    ).join('');
  });
}

function changeViewMonth(tab) {
  const selId = tab === 'clientes' ? 'month-select-clientes' : 'month-select-compras';
  const newKey = document.getElementById(selId).value;
  viewMonthKey = newKey;
  // Sincronizar el otro selector
  const otherId = tab === 'clientes' ? 'month-select-compras' : 'month-select-clientes';
  document.getElementById(otherId).value = newKey;
  loadViewPurchases();
}

function isCurrentMonth() {
  return viewMonthKey === currentMonthKey;
}

function viewMonthLabel() {
  const [y, m] = viewMonthKey.split('-');
  return MONTHS[parseInt(m)-1] + ' ' + y;
}

async function seedProducts() {
  const snap = await db.collection('products').get();
  if (!snap.empty) return;
  const defaults = [
    {id:'p1',name:'Leche entera',   price:3200,cat:'Lácteos', stock:10},
    {id:'p2',name:'Queso campesino',price:8500,cat:'Lácteos', stock:5},
    {id:'p3',name:'Arroz 1kg',      price:4200,cat:'Granos',  stock:20},
    {id:'p4',name:'Aceite 1L',      price:9800,cat:'Aceites', stock:8},
    {id:'p5',name:'Azúcar 1kg',     price:3500,cat:'Granos',  stock:15},
    {id:'p6',name:'Jabón de baño',  price:2800,cat:'Aseo',    stock:12},
  ];
  for (const p of defaults) await db.collection('products').doc(p.id).set(p);
}

async function loadAll() {
  const [uSnap, pSnap] = await Promise.all([
    db.collection('users').get(),
    db.collection('products').get()
  ]);
  cachedUsers    = uSnap.docs.map(d => d.data());
  cachedProducts = pSnap.docs.map(d => d.data());
}

// Suscripción al mes actual (para clientes y escritura)
function subscribePurchases(cb) {
  if (unsubPurchases) { unsubPurchases(); unsubPurchases = null; }
  unsubPurchases = db.collection('purchases')
    .where('monthKey','==',currentMonthKey)
    .onSnapshot(snap => {
      cachedPurchases = snap.docs.map(d => ({id:d.id,...d.data()}));
      cb();
    });
}

// Carga compras del mes que se está viendo en admin
function loadViewPurchases() {
  if (unsubView) { unsubView(); unsubView = null; }
  unsubView = db.collection('purchases')
    .where('monthKey','==',viewMonthKey)
    .onSnapshot(snap => {
      viewPurchases = snap.docs.map(d => ({id:d.id,...d.data()}));
      renderAdmin();
    });
}

mainAuth.onAuthStateChanged(async fbUser => {
  if (!fbUser) {
    currentUser = null;
    if (unsubPurchases) { unsubPurchases(); unsubPurchases = null; }
    if (unsubView) { unsubView(); unsubView = null; }
    showScreen('screen-login');
    const btn = document.getElementById('btn-login');
    btn.disabled = false; btn.textContent = 'Ingresar';
    return;
  }
  await loadAll();
  if (fbUser.email === ADMIN_EMAIL) {
    currentUser = {id:'admin', name:'Administrador', username:'admin', role:'admin'};
  } else {
    const profile = cachedUsers.find(u => toEmail(u.username) === fbUser.email);
    if (!profile) { await mainAuth.signOut(); return; }
    currentUser = profile;
  }
  document.getElementById('btn-login').disabled = false;
  document.getElementById('btn-login').textContent = 'Ingresar';
  document.getElementById('login-error').textContent = '';
  if (currentUser.role === 'admin') {
    populateMonthSelectors();
    subscribePurchases(() => {}); // mantener escucha del mes actual
    loadViewPurchases();          // cargar mes visto (arranca en el actual)
    showScreen('screen-admin');
  } else {
    subscribePurchases(renderCliente);
    renderCliente();
    showScreen('screen-cliente');
  }
});

function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('login-error');
  if (!username || !password) { err.textContent = 'Completa usuario y contraseña'; return; }
  btn.disabled = true; btn.textContent = 'Ingresando...'; err.textContent = '';
  mainAuth.signInWithEmailAndPassword(toEmail(username), password)
    .catch(() => {
      err.textContent = 'Usuario o contraseña incorrectos';
      btn.disabled = false; btn.textContent = 'Ingresar';
    });
}

function doLogout() {
  if (unsubPurchases) { unsubPurchases(); unsubPurchases = null; }
  if (unsubView) { unsubView(); unsubView = null; }
  currentUser = null;
  mainAuth.signOut();
}

function showAdminTab(tab) {
  ['clientes','compras','productos'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('tbtn-'+t).classList.toggle('active', t===tab);
  });
}

function showClientTab(tab) {
  ['catalogo','miscuentas'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('tbtn-'+t).classList.toggle('active', t===tab);
  });
  if (tab === 'miscuentas') renderClientPurchases();
}

const getProduct   = id => cachedProducts.find(p => p.id === id);
const clientDebtOf = (userId, purchases) =>
  purchases.filter(p => p.userId === userId)
    .reduce((s,p) => { const pr = getProduct(p.productId); return s + (pr ? pr.price*p.qty : 0); }, 0);

function renderAdmin() {
  const isHistoric  = !isCurrentMonth();
  const label       = viewMonthLabel();
  const purchases   = viewPurchases;
  const clients     = cachedUsers.filter(u => u.role === 'cliente');
  const totalDebt   = clients.reduce((s,c) => s + clientDebtOf(c.id, purchases), 0);

  document.getElementById('admin-month-label').textContent = label;

  // Títulos con badge histórico
  const historicBadge = isHistoric ? `<span class="historic-badge">Histórico</span>` : '';
  document.getElementById('clients-section-title').innerHTML  = `Clientes · ${label} ${historicBadge}`;
  document.getElementById('compras-section-title').innerHTML  = `Compras · ${label} ${historicBadge}`;

  document.getElementById('admin-metrics').innerHTML =
    `<div class="metric"><div class="metric-label">Clientes</div><div class="metric-val">${clients.length}</div></div>
     <div class="metric"><div class="metric-label">Compras · ${label}</div><div class="metric-val">${purchases.length}</div></div>
     <div class="metric"><div class="metric-label">Total deuda · ${label}</div><div class="metric-val" style="font-size:17px;">${fmt(totalDebt)}</div></div>`;

  // Tabla clientes con deuda del mes visto
  const cl = document.getElementById('admin-clients-list');
  cl.innerHTML = clients.length === 0
    ? '<div class="empty">Sin clientes registrados</div>'
    : `<table><tr><th>Cliente</th><th>Usuario</th><th>Compras</th><th>Deuda ${label}</th><th></th></tr>`
      + clients.map(c => {
          const debt  = clientDebtOf(c.id, purchases);
          const badge = debt===0?'badge-green':debt>50000?'badge-red':'badge-amber';
          const compras = purchases.filter(p=>p.userId===c.id).length;
          return `<tr>
            <td><div style="display:flex;align-items:center;gap:9px;"><div class="initials">${initials(c.name)}</div>${c.name}</div></td>
            <td style="color:#aaa;">${c.username}</td>
            <td>${compras}</td>
            <td><span class="badge ${badge}">${fmt(debt)}</span></td>
            <td>${isHistoric?'':` <button class="btn-danger" onclick="deleteClient('${c.id}')">Eliminar</button>`}</td>
          </tr>`;
        }).join('') + '</table>';

  // Ocultar formulario de agregar cliente en vista histórica
  document.getElementById('add-client-card').style.display = isHistoric ? 'none' : 'block';

  // Compras por cliente del mes visto
  const pl = document.getElementById('admin-purchases-list');
  pl.innerHTML = clients.length === 0
    ? '<div class="empty">Sin clientes registrados</div>'
    : clients.map(c => {
        const cmp  = purchases.filter(p => p.userId === c.id);
        const debt = clientDebtOf(c.id, purchases);
        return `<div class="client-block">
          <div class="client-header">
            <div class="initials">${initials(c.name)}</div>
            <span style="font-weight:600;font-size:14px;">${c.name}</span>
            <span class="badge ${debt===0?'badge-green':debt>50000?'badge-red':'badge-amber'}">${fmt(debt)}</span>
          </div>
          ${cmp.length===0
            ? `<div style="font-size:12px;color:#aaa;padding-left:44px;">Sin compras en ${label}</div>`
            : `<table style="margin-left:44px;width:calc(100% - 44px);">
                <tr><th>Producto</th><th>Cant.</th><th>Subtotal</th><th>Fecha</th>${isHistoric?'':'<th></th>'}</tr>`
              + cmp.map(p => {
                  const pr = getProduct(p.productId);
                  return `<tr><td>${pr?pr.name:'–'}</td><td>${p.qty}</td>
                    <td>${pr?fmt(pr.price*p.qty):'–'}</td>
                    <td style="color:#aaa;">${p.date}</td>
                    ${isHistoric?'':`<td><button class="btn-danger" onclick="adminDelPurchase('${p.id}','${p.productId}',${p.qty})">×</button></td>`}
                  </tr>`;
                }).join('') + '</table>'
          }
        </div>`;
      }).join('');

  // Productos
  const pt = document.getElementById('admin-products-list');
  pt.innerHTML = cachedProducts.length===0
    ? '<div class="empty">Sin productos. Agrega el primero abajo.</div>'
    : `<table><tr><th>Imagen</th><th>Producto</th><th>Categoría</th><th>Precio</th><th>Stock</th><th>Ajustar</th><th></th></tr>`
      + cachedProducts.map(p => {
          const stockBadge = p.stock<=0?'badge-red':p.stock<=3?'badge-amber':'badge-green';
          return `<tr>
            <td>${p.img
              ?`<img src="${p.img}" style="width:44px;height:44px;object-fit:cover;border-radius:8px;border:1px solid #e8e8e2;" onerror="this.style.display='none'"/>`
              :`<div style="width:44px;height:44px;border-radius:8px;background:#f0f0ea;display:flex;align-items:center;justify-content:center;font-size:18px;">🛒</div>`
            }</td>
            <td style="font-weight:600;">${p.name}</td>
            <td style="color:#aaa;">${p.cat}</td>
            <td style="color:#1D9E75;font-weight:700;">${fmt(p.price)}</td>
            <td><span class="badge ${stockBadge}">${p.stock!==undefined?p.stock:'–'}</span></td>
            <td>
              <div style="display:flex;align-items:center;gap:4px;">
                <input type="number" id="adj-${p.id}" value="0" style="width:55px;padding:4px 6px;font-size:12px;border:1px solid #e0e0da;border-radius:6px;background:#fafaf8;color:#1a1a1a;outline:none;"/>
                <button class="btn-stock" onclick="adjustStock('${p.id}')">+/−</button>
              </div>
            </td>
            <td><button class="btn-danger" onclick="deleteProduct('${p.id}')">Eliminar</button></td>
          </tr>`;
        }).join('') + '</table>';
}

function renderCliente() {
  document.getElementById('client-welcome').textContent =
    'Hola, '+currentUser.name+' · '+MONTHS[currentMonth]+' '+currentYear;
  document.getElementById('client-month-badge').textContent = MONTHS[currentMonth]+' '+currentYear;

  const grid = document.getElementById('client-product-grid');
  grid.innerHTML = cachedProducts.length===0
    ? '<div class="empty">No hay productos disponibles aún</div>'
    : cachedProducts.map(p => {
        const agotado = (p.stock !== undefined && p.stock <= 0);
        return `<div class="product-card${agotado?' agotado':''}">
          ${agotado?'<div class="agotado-banner">AGOTADO</div>':''}
          ${p.img
            ?`<img class="product-img" src="${p.img}" alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"/><div class="product-img-placeholder" style="display:none;">🛒</div>`
            :`<div class="product-img-placeholder">🛒</div>`
          }
          <div class="product-info">
            <div class="product-cat">${p.cat}</div>
            <div class="product-name">${p.name}</div>
            <div class="product-price">${fmt(p.price)}</div>
            ${agotado
              ?`<div style="font-size:12px;color:#a32d2d;font-weight:600;margin-top:4px;">No disponible</div>`
              :`<div style="display:flex;align-items:center;gap:6px;margin-top:6px;">
                  <input type="number" id="qty-${p.id}" value="1" min="1" max="${p.stock||999}"
                    style="width:52px;padding:6px 8px;font-size:13px;border:1px solid #e0e0da;border-radius:8px;background:#fafaf8;color:#1a1a1a;outline:none;"/>
                  <button class="btn-add" style="flex:1;padding:7px 10px;font-size:12px;"
                    onclick="addPurchase('${p.id}')">Agregar</button>
                </div>`
            }
          </div>
        </div>`;
      }).join('');
  renderClientPurchases();
}

function renderClientPurchases() {
  if (!currentUser) return;
  const mp    = cachedPurchases.filter(p => p.userId === currentUser.id);
  const total = clientDebtOf(currentUser.id, cachedPurchases);
  const list  = document.getElementById('client-purchases-list');
  list.innerHTML = mp.length===0
    ? '<div class="empty">No has registrado compras este mes</div>'
    : mp.map(p => {
        const pr = getProduct(p.productId);
        return `<div class="purchase-row">
          <div>
            <div style="font-size:13px;font-weight:600;">${pr?pr.name:'Producto eliminado'}</div>
            <div style="font-size:12px;color:#aaa;margin-top:2px;">Cantidad: ${p.qty} · ${p.date}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-size:14px;font-weight:700;color:#1D9E75;">${pr?fmt(pr.price*p.qty):'–'}</span>
            <button class="btn-danger" onclick="deleteMyPurchase('${p.id}','${p.productId}',${p.qty})">×</button>
          </div>
        </div>`;
      }).join('');
  document.getElementById('client-total-bar').innerHTML =
    `<span class="total-label">Total a pagar · ${MONTHS[currentMonth]}</span>
     <span class="total-val">${fmt(total)}</span>`;
}

// ── ACCIONES ────────────────────────────────────────────────

function addPurchase(productId) {
  const pr = getProduct(productId);
  if (!pr) return;
  const qty = parseInt(document.getElementById('qty-'+productId)?.value)||1;
  if (pr.stock !== undefined && qty > pr.stock) {
    const al = document.getElementById('client-alert');
    al.innerHTML = `<div class="alert alert-error">Solo hay ${pr.stock} unidades disponibles</div>`;
    setTimeout(()=>al.innerHTML='',3000);
    return;
  }
  const batch = db.batch();
  const purchaseRef = db.collection('purchases').doc();
  batch.set(purchaseRef, {userId:currentUser.id, productId, qty, date:todayStr, monthKey:currentMonthKey});
  if (pr.stock !== undefined) {
    batch.update(db.collection('products').doc(productId), {stock: pr.stock - qty});
  }
  batch.commit().then(() => {
    const idx = cachedProducts.findIndex(p => p.id === productId);
    if (idx !== -1 && cachedProducts[idx].stock !== undefined) cachedProducts[idx].stock -= qty;
    const al = document.getElementById('client-alert');
    al.innerHTML = `<div class="alert alert-success">✓ ${pr.name} ×${qty} agregado a tu cuenta</div>`;
    setTimeout(()=>al.innerHTML='',2500);
    renderCliente();
  });
}

function deleteMyPurchase(id, productId, qty) {
  const pr = getProduct(productId);
  const batch = db.batch();
  batch.delete(db.collection('purchases').doc(id));
  if (pr && pr.stock !== undefined) {
    batch.update(db.collection('products').doc(productId), {stock: pr.stock + qty});
  }
  batch.commit().then(() => {
    if (pr && pr.stock !== undefined) {
      const idx = cachedProducts.findIndex(p => p.id === productId);
      if (idx !== -1) cachedProducts[idx].stock += qty;
    }
    renderCliente();
  });
}

function adminDelPurchase(id, productId, qty) {
  const pr = getProduct(productId);
  const batch = db.batch();
  batch.delete(db.collection('purchases').doc(id));
  if (pr && pr.stock !== undefined) {
    batch.update(db.collection('products').doc(productId), {stock: pr.stock + qty});
  }
  batch.commit().then(() => {
    if (pr && pr.stock !== undefined) {
      const idx = cachedProducts.findIndex(p => p.id === productId);
      if (idx !== -1) cachedProducts[idx].stock += qty;
    }
  });
}

function adjustStock(productId) {
  const input = document.getElementById('adj-'+productId);
  const delta = parseInt(input.value);
  if (isNaN(delta) || delta === 0) return;
  const pr = getProduct(productId);
  if (!pr) return;
  const newStock = Math.max(0, (pr.stock||0) + delta);
  db.collection('products').doc(productId).update({stock: newStock}).then(() => {
    const idx = cachedProducts.findIndex(p => p.id === productId);
    if (idx !== -1) cachedProducts[idx].stock = newStock;
    input.value = 0;
    renderAdmin();
  });
}

function addClient() {
  const name     = document.getElementById('nc-name').value.trim();
  const username = document.getElementById('nc-user').value.trim().toLowerCase();
  const password = document.getElementById('nc-pass').value;
  const msg      = document.getElementById('add-client-msg');
  const btn      = document.getElementById('btn-add-client');
  msg.style.color = '#c0392b';
  if (!name||!username||!password)               { msg.textContent='Completa todos los campos'; return; }
  if (cachedUsers.find(u=>u.username===username)) { msg.textContent='Ese usuario ya existe'; return; }
  if (password.length < 6)                        { msg.textContent='La contraseña debe tener mínimo 6 caracteres'; return; }
  btn.disabled=true; btn.textContent='Creando...'; msg.textContent='';
  secAuth.createUserWithEmailAndPassword(username+CLIENT_DOMAIN, password)
    .then(cred => {
      const newUser = {id:cred.user.uid, name, username, role:'cliente', email:username+CLIENT_DOMAIN};
      return db.collection('users').doc(cred.user.uid).set(newUser)
        .then(() => secAuth.signOut())
        .then(() => {
          cachedUsers.push(newUser);
          document.getElementById('nc-name').value='';
          document.getElementById('nc-user').value='';
          document.getElementById('nc-pass').value='';
          msg.style.color='#2d6a11';
          msg.textContent='✓ Cliente "'+name+'" creado correctamente';
          setTimeout(()=>msg.textContent='',3000);
          renderAdmin();
        });
    })
    .catch(e => {
      msg.textContent = e.code==='auth/email-already-in-use' ? 'Ese usuario ya existe' : 'Error: '+e.message;
    })
    .finally(() => { btn.disabled=false; btn.textContent='+ Agregar'; });
}

function deleteClient(id) {
  if (!confirm('¿Eliminar este cliente y todas sus compras?')) return;
  const toDel = cachedPurchases.filter(p=>p.userId===id);
  const batch = db.batch();
  toDel.forEach(p => batch.delete(db.collection('purchases').doc(p.id)));
  batch.delete(db.collection('users').doc(id));
  batch.commit().then(() => {
    cachedUsers = cachedUsers.filter(u=>u.id!==id);
    renderAdmin();
  });
}

function addProduct() {
  const name  = document.getElementById('np-name').value.trim();
  const price = parseFloat(document.getElementById('np-price').value);
  const cat   = document.getElementById('np-cat').value.trim();
  const stock = parseInt(document.getElementById('np-stock').value)||0;
  const img   = document.getElementById('np-img').value.trim();
  const err   = document.getElementById('add-prod-error');
  const btn   = document.getElementById('btn-add-prod');
  if (!name||!price||!cat) { err.textContent='Completa nombre, precio y categoría'; return; }
  btn.disabled=true; btn.textContent='Guardando...';
  const id   = uid();
  const data = {id,name,price,cat,stock};
  if (img) data.img = img;
  db.collection('products').doc(id).set(data)
    .then(() => {
      cachedProducts.push(data);
      err.textContent='';
      ['np-name','np-price','np-cat','np-stock','np-img'].forEach(i=>document.getElementById(i).value='');
      renderAdmin();
    })
    .finally(()=>{ btn.disabled=false; btn.textContent='+ Agregar'; });
}

function deleteProduct(id) {
  if (!confirm('¿Eliminar este producto?')) return;
  db.collection('products').doc(id).delete().then(() => {
    cachedProducts = cachedProducts.filter(p=>p.id!==id);
    renderAdmin();
  });
}

document.addEventListener('keydown', e => {
  if (e.key==='Enter' && document.getElementById('screen-login').style.display!=='none') doLogin();
});

(async () => {
  try {
    await seedProducts();
    await loadAll();
  } catch(e) {
    console.error('Error de conexión:', e);
  }
  if (!mainAuth.currentUser) showScreen('screen-login');
})();
</script>
