<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tienda Elena</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --blue:       #1B3E7A;
    --blue-light: #2A5BA8;
    --blue-pale:  #E8EEF8;
    --gold:       #F5A623;
    --gold-light: #FFF3DC;
    --coral:      #E8475F;
    --coral-light:#FDEAED;
    --dark:       #0D1F3C;
    --gray-bg:    #F4F6FB;
    --gray-card:  #FFFFFF;
    --gray-border:#DDE3F0;
    --gray-muted: #7A8BAD;
    --gray-text:  #1D2B45;
    --success-bg: #EAF3DE;
    --success:    #2d6a11;
    --warn-bg:    #FFF3DC;
    --warn:       #a05c00;
    --danger-bg:  #FDEAED;
    --danger:     #C0392B;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--gray-bg);color:var(--gray-text);min-height:100vh;}

  /* ── LOGIN ── */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    background: linear-gradient(135deg, var(--dark) 0%, var(--blue) 60%, var(--blue-light) 100%);}
  .login-card{background:#fff;border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:380px;
    box-shadow:0 20px 60px rgba(13,31,60,.35);}
  .login-logos{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:1px solid var(--gray-border);}
  .login-logos img{height:36px;object-fit:contain;}
  .login-logos .sep{width:1px;height:36px;background:var(--gray-border);}
  .login-title{font-size:20px;font-weight:800;color:var(--dark);text-align:center;margin-bottom:4px;}
  .login-sub{font-size:13px;color:var(--gray-muted);text-align:center;margin-bottom:1.5rem;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--gray-muted);margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
  .field input{width:100%;padding:11px 14px;font-size:14px;border:1.5px solid var(--gray-border);border-radius:10px;background:var(--gray-bg);color:var(--gray-text);outline:none;transition:border-color .2s,box-shadow .2s;font-family:'Nunito',sans-serif;}
  .field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-pale);}
  .btn-primary{width:100%;padding:12px;background:linear-gradient(135deg,var(--blue),var(--blue-light));color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;font-family:'Nunito',sans-serif;transition:opacity .2s,transform .1s;}
  .btn-primary:hover{opacity:.92;}
  .btn-primary:active{transform:scale(.98);}
  .btn-primary:disabled{background:#aaa;cursor:not-allowed;}
  .error-msg{font-size:12px;color:var(--danger);margin-top:8px;font-weight:600;}

  /* ── TOPBAR ── */
  .topbar{background:linear-gradient(135deg,var(--dark),var(--blue));padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;height:58px;}
  .topbar-left{display:flex;align-items:center;gap:14px;}
  .topbar-logos{display:flex;align-items:center;gap:10px;}
  .topbar-logos img{height:22px;object-fit:contain;opacity:.95;}
  .topbar-logos .sep{width:1px;height:20px;background:rgba(255,255,255,.3);}
  .topbar-info{display:flex;flex-direction:column;}
  .topbar-title{font-size:14px;font-weight:800;color:#fff;letter-spacing:-.2px;}
  .topbar-sub{font-size:11px;color:rgba(255,255,255,.65);}
  .btn-logout{font-size:12px;padding:6px 14px;border:1.5px solid rgba(255,255,255,.35);border-radius:8px;background:transparent;color:#fff;cursor:pointer;font-weight:700;font-family:'Nunito',sans-serif;transition:background .2s;}
  .btn-logout:hover{background:rgba(255,255,255,.15);}

  /* ── CONTENT ── */
  .content{padding:22px 20px;max-width:760px;margin:0 auto;}

  /* ── TABS ── */
  .tabs{display:flex;gap:4px;margin-bottom:22px;background:#fff;border-radius:12px;padding:5px;border:1px solid var(--gray-border);}
  .tab{flex:1;padding:8px 10px;font-size:13px;cursor:pointer;color:var(--gray-muted);background:transparent;border:none;border-radius:8px;font-weight:700;font-family:'Nunito',sans-serif;transition:all .2s;}
  .tab.active{color:#fff;background:linear-gradient(135deg,var(--blue),var(--blue-light));box-shadow:0 2px 8px rgba(27,62,122,.3);}
  .tab-content{display:none;}
  .tab-content.active{display:block;}

  /* ── CARDS ── */
  .card{background:#fff;border:1px solid var(--gray-border);border-radius:16px;padding:1.25rem 1.5rem;margin-bottom:16px;box-shadow:0 2px 8px rgba(13,31,60,.04);}

  /* ── METRICS ── */
  .metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:22px;}
  .metric{background:#fff;border:1px solid var(--gray-border);border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(13,31,60,.04);position:relative;overflow:hidden;}
  .metric::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--blue-light));}
  .metric-label{font-size:11px;color:var(--gray-muted);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
  .metric-val{font-size:24px;font-weight:800;color:var(--dark);}
  .metric.accent::before{background:linear-gradient(90deg,var(--gold),#f7c464);}
  .metric.accent .metric-val{color:var(--blue);}

  /* ── TABLE ── */
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;padding:10px 12px;color:var(--gray-muted);font-weight:700;border-bottom:2px solid var(--gray-bg);font-size:11px;text-transform:uppercase;letter-spacing:.5px;}
  td{padding:12px 12px;border-bottom:1px solid var(--gray-bg);color:var(--gray-text);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:var(--gray-bg);}

  /* ── BADGES ── */
  .badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;}
  .badge-green{background:var(--success-bg);color:var(--success);}
  .badge-amber{background:var(--warn-bg);color:var(--warn);}
  .badge-red{background:var(--danger-bg);color:var(--danger);}

  /* ── FORMS ── */
  .form-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
  .form-row .field{flex:1;margin-bottom:0;min-width:110px;}
  .btn-add{padding:11px 18px;font-size:13px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--blue-light));color:#fff;cursor:pointer;font-weight:700;white-space:nowrap;font-family:'Nunito',sans-serif;transition:opacity .2s;}
  .btn-add:hover{opacity:.9;}
  .btn-add:disabled{background:#aaa;cursor:not-allowed;}
  .btn-danger{padding:5px 11px;font-size:12px;border:1.5px solid #f0c0c0;border-radius:8px;background:#fff;color:var(--danger);cursor:pointer;font-weight:700;font-family:'Nunito',sans-serif;}
  .btn-danger:hover{background:var(--danger-bg);}
  .btn-stock{padding:5px 11px;font-size:12px;border:1.5px solid var(--gray-border);border-radius:8px;background:#fff;color:var(--gray-text);cursor:pointer;font-weight:700;font-family:'Nunito',sans-serif;}
  .btn-stock:hover{background:var(--gray-bg);}

  /* ── PRODUCTS ── */
  .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px;margin-bottom:20px;}
  .product-card{background:#fff;border:1.5px solid var(--gray-border);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s,border-color .2s;}
  .product-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(13,31,60,.1);border-color:var(--blue);}
  .product-card.agotado{opacity:.65;}
  .product-img{width:100%;height:120px;object-fit:cover;}
  .product-img-placeholder{width:100%;height:120px;background:var(--blue-pale);display:flex;align-items:center;justify-content:center;font-size:32px;}
  .product-info{padding:12px;display:flex;flex-direction:column;gap:4px;flex:1;}
  .product-name{font-size:13px;font-weight:700;color:var(--dark);}
  .product-price{font-size:15px;color:var(--blue);font-weight:800;}
  .product-cat{font-size:11px;color:var(--gray-muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
  .stock-tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;display:inline-block;}
  .stock-ok{background:var(--success-bg);color:var(--success);}
  .stock-low{background:var(--warn-bg);color:var(--warn);}
  .stock-out{background:var(--danger-bg);color:var(--danger);}

  /* ── PURCHASE LIST ── */
  .purchase-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--gray-bg);}
  .purchase-row:last-child{border-bottom:none;}

  /* ── TOTAL BAR ── */
  .total-bar{background:linear-gradient(135deg,var(--dark),var(--blue));border-radius:14px;padding:16px 1.5rem;display:flex;align-items:center;justify-content:space-between;margin-top:16px;}
  .total-label{font-size:13px;color:rgba(255,255,255,.8);font-weight:700;}
  .total-val{font-size:24px;font-weight:800;color:#fff;}

  /* ── MISC ── */
  .initials{width:36px;height:36px;border-radius:50%;background:var(--blue-pale);color:var(--blue);display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;}
  .alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:14px;font-weight:700;}
  .alert-success{background:var(--success-bg);color:var(--success);}
  .alert-error{background:var(--danger-bg);color:var(--danger);}
  .empty{font-size:13px;color:var(--gray-muted);text-align:center;padding:2.5rem;font-weight:600;}
  .loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--dark),var(--blue));gap:16px;}
  .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:14px;color:rgba(255,255,255,.8);font-weight:700;}
  .section-title{font-size:15px;font-weight:800;color:var(--dark);margin-bottom:14px;}
  .client-block{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--gray-bg);}
  .client-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
  .client-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .agotado-banner{background:var(--danger);color:#fff;font-size:11px;font-weight:800;text-align:center;padding:5px;letter-spacing:.8px;}
  .month-selector{display:flex;align-items:center;gap:10px;margin-bottom:18px;background:#fff;border:1px solid var(--gray-border);border-radius:12px;padding:12px 16px;}
  .month-selector label{font-size:12px;color:var(--gray-muted);font-weight:700;white-space:nowrap;text-transform:uppercase;letter-spacing:.5px;}
  .month-selector select{flex:1;padding:7px 10px;font-size:13px;border:1.5px solid var(--gray-border);border-radius:8px;background:var(--gray-bg);color:var(--gray-text);outline:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:600;}
  .month-selector select:focus{border-color:var(--blue);}
  .historic-badge{display:inline-block;background:var(--gold-light);color:var(--warn);font-size:11px;font-weight:800;padding:3px 10px;border-radius:999px;margin-left:8px;vertical-align:middle;border:1px solid var(--gold);}
  .ganancia-card{background:linear-gradient(135deg,var(--gold),#f7c464);border-radius:14px;padding:16px;box-shadow:0 4px 16px rgba(245,166,35,.3);position:relative;overflow:hidden;}
  .ganancia-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.4);}
  .ganancia-card .metric-label{color:rgba(13,31,60,.7);}
  .ganancia-card .metric-val{color:var(--dark);font-size:22px;}
  @media(max-width:480px){
    .metrics{grid-template-columns:repeat(2,minmax(0,1fr));}
    .form-row{flex-direction:column;}
    .form-row .field{min-width:100%;}
    .btn-add{width:100%;}
    .topbar-logos img{height:18px;}
  }
</style>
</head>

  <div class="content">
    <div class="metrics" id="admin-metrics"></div>
    <div class="tabs">
      <button class="tab active" id="tbtn-clientes"  onclick="showAdminTab('clientes')">Clientes</button>
      <button class="tab"        id="tbtn-compras"   onclick="showAdminTab('compras')">Compras</button>
      <button class="tab"        id="tbtn-productos" onclick="showAdminTab('productos')">Productos</button>
    </div>

    <div id="tab-clientes" class="tab-content active">
      <div class="month-selector">
        <label>Ver mes:</label>
        <select id="month-select-clientes" onchange="changeViewMonth('clientes')"></select>
      </div>
      <div class="card" style="margin-bottom:16px;">
        <div class="section-title" id="clients-section-title">Clientes registrados</div>
        <div id="admin-clients-list"></div>
      </div>
      <div class="card" id="add-client-card">
        <div class="section-title">Agregar cliente</div>
        <div class="form-row">
          <div class="field"><label>Nombre completo</label><input id="nc-name" type="text" placeholder="Ej: Ana Torres"/></div>
          <div class="field"><label>Usuario</label><input id="nc-user" type="text" placeholder="ana"/></div>
          <div class="field"><label>Contraseña (mín. 6 caracteres)</label><input id="nc-pass" type="password" placeholder="clave"/></div>
          <button class="btn-add" id="btn-add-client" onclick="addClient()">+ Agregar</button>
        </div>
        <div id="add-client-msg" class="error-msg"></div>
      </div>
    </div>

    <div id="tab-compras" class="tab-content">
      <div class="month-selector">
        <label>Ver mes:</label>
        <select id="month-select-compras" onchange="changeViewMonth('compras')"></select>
      </div>
      <div class="card">
        <div class="section-title" id="compras-section-title">Compras del mes por cliente</div>
        <div id="admin-purchases-list"></div>
      </div>
    </div>

    <div id="tab-productos" class="tab-content">
      <div class="card" style="margin-bottom:16px;">
        <div class="section-title">Catálogo e inventario</div>
        <div id="admin-products-list"></div>
      </div>
      <div class="card">
        <div class="section-title">Agregar producto</div>
        <div class="form-row">
          <div class="field"><label>Nombre</label><input id="np-name" type="text" placeholder="Ej: Leche entera"/></div>
          <div class="field"><label>Precio ($)</label><input id="np-price" type="number" placeholder="0" min="0"/></div>
          <div class="field"><label>Categoría</label><input id="np-cat" type="text" placeholder="Ej: Lácteos"/></div>
          <div class="field"><label>Stock</label><input id="np-stock" type="number" placeholder="0" min="0"/></div>
        </div>
        <div class="form-row" style="margin-top:10px;">
          <div class="field" style="flex:3;"><label>URL de imagen (opcional)</label><input id="np-img" type="url" placeholder="https://i.imgur.com/ejemplo.jpg"/></div>
          <button class="btn-add" id="btn-add-prod" onclick="addProduct()">+ Agregar</button>
        </div>
        <div id="add-prod-error" class="error-msg"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const CFG={apiKey:"AIzaSyBLaUqijK3HC2Pn3CmT6xDi96MZnp0HrJs",authDomain:"tienda-elena.firebaseapp.com",projectId:"tienda-elena",storageBucket:"tienda-elena.firebasestorage.app",messagingSenderId:"1077308083283",appId:"1:1077308083283:web:ecedcfbe86e61fbb870aa6"};
const ADMIN_EMAIL="alezzespinoza14@gmail.com",CLIENT_DOMAIN="@tienda-elena.com";
const mainApp=firebase.initializeApp(CFG,"main"),mainAuth=mainApp.auth(),db=mainApp.firestore();
const secApp=firebase.initializeApp(CFG,"secondary"),secAuth=secApp.auth();
const MONTHS=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const now=new Date(),currentMonth=now.getMonth(),currentYear=now.getFullYear();
const currentMonthKey=currentYear+"-"+String(currentMonth+1).padStart(2,"0");
const todayStr=now.toISOString().slice(0,10);
let viewMonthKey=currentMonthKey;
let currentUser=null,cachedUsers=[],cachedProducts=[],cachedPurchases=[],viewPurchases=[],unsubPurchases=null,unsubView=null;
const fmt=n=>"$"+Math.round(n).toLocaleString("es-CO");
const initials=n=>n.trim().split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const toEmail=u=>u.includes("@")?u:u.toLowerCase().trim()+CLIENT_DOMAIN;
function showScreen(id){["loading-screen","screen-login","screen-admin","screen-cliente"].forEach(s=>document.getElementById(s).style.display="none");document.getElementById(id).style.display="block";}
function buildMonthOptions(){const o=[];for(let i=0;i<12;i++){const d=new Date(currentYear,currentMonth-i,1),y=d.getFullYear(),m=d.getMonth(),k=y+"-"+String(m+1).padStart(2,"0"),lbl=MONTHS[m]+" "+y+(i===0?" (mes actual)":"");o.push({key:k,label:lbl});}return o;}
function populateMonthSelectors(){const opts=buildMonthOptions();["month-select-clientes","month-select-compras"].forEach(id=>{const s=document.getElementById(id);s.innerHTML=opts.map(o=>`<option value="${o.key}"${o.key===viewMonthKey?" selected":""}>${o.label}</option>`).join("");});}
function changeViewMonth(tab){const id=tab==="clientes"?"month-select-clientes":"month-select-compras";viewMonthKey=document.getElementById(id).value;const oid=tab==="clientes"?"month-select-compras":"month-select-clientes";document.getElementById(oid).value=viewMonthKey;loadViewPurchases();}
function isCurrentMonth(){return viewMonthKey===currentMonthKey;}
function viewMonthLabel(){const[y,m]=viewMonthKey.split("-");return MONTHS[parseInt(m)-1]+" "+y;}
async function seedProducts(){const s=await db.collection("products").get();if(!s.empty)return;const d=[{id:"p1",name:"Leche entera",price:3200,cat:"Lácteos",stock:10},{id:"p2",name:"Queso campesino",price:8500,cat:"Lácteos",stock:5},{id:"p3",name:"Arroz 1kg",price:4200,cat:"Granos",stock:20},{id:"p4",name:"Aceite 1L",price:9800,cat:"Aceites",stock:8},{id:"p5",name:"Azúcar 1kg",price:3500,cat:"Granos",stock:15},{id:"p6",name:"Jabón de baño",price:2800,cat:"Aseo",stock:12}];for(const p of d)await db.collection("products").doc(p.id).set(p);}
async function loadAll(){const[u,p]=await Promise.all([db.collection("users").get(),db.collection("products").get()]);cachedUsers=u.docs.map(d=>d.data());cachedProducts=p.docs.map(d=>d.data());}
function subscribePurchases(cb){if(unsubPurchases){unsubPurchases();unsubPurchases=null;}unsubPurchases=db.collection("purchases").where("monthKey","==",currentMonthKey).onSnapshot(s=>{cachedPurchases=s.docs.map(d=>({id:d.id,...d.data()}));cb();});}
function loadViewPurchases(){if(unsubView){unsubView();unsubView=null;}unsubView=db.collection("purchases").where("monthKey","==",viewMonthKey).onSnapshot(s=>{viewPurchases=s.docs.map(d=>({id:d.id,...d.data()}));renderAdmin();});}
mainAuth.onAuthStateChanged(async fbUser=>{if(!fbUser){currentUser=null;if(unsubPurchases){unsubPurchases();unsubPurchases=null;}if(unsubView){unsubView();unsubView=null;}showScreen("screen-login");const b=document.getElementById("btn-login");b.disabled=false;b.textContent="Ingresar";return;}await loadAll();if(fbUser.email===ADMIN_EMAIL){currentUser={id:"admin",name:"Administrador",username:"admin",role:"admin"};}else{const p=cachedUsers.find(u=>toEmail(u.username)===fbUser.email);if(!p){await mainAuth.signOut();return;}currentUser=p;}document.getElementById("btn-login").disabled=false;document.getElementById("btn-login").textContent="Ingresar";document.getElementById("login-error").textContent="";if(currentUser.role==="admin"){populateMonthSelectors();subscribePurchases(()=>{});loadViewPurchases();showScreen("screen-admin");}else{subscribePurchases(renderCliente);renderCliente();showScreen("screen-cliente");}});
function doLogin(){const u=document.getElementById("login-user").value.trim(),p=document.getElementById("login-pass").value,b=document.getElementById("btn-login"),e=document.getElementById("login-error");if(!u||!p){e.textContent="Completa usuario y contraseña";return;}b.disabled=true;b.textContent="Ingresando...";e.textContent="";mainAuth.signInWithEmailAndPassword(toEmail(u),p).catch(()=>{e.textContent="Usuario o contraseña incorrectos";b.disabled=false;b.textContent="Ingresar";});}
function doLogout(){if(unsubPurchases){unsubPurchases();unsubPurchases=null;}if(unsubView){unsubView();unsubView=null;}currentUser=null;mainAuth.signOut();}
function showAdminTab(t){["clientes","compras","productos"].forEach(x=>{document.getElementById("tab-"+x).classList.toggle("active",x===t);document.getElementById("tbtn-"+x).classList.toggle("active",x===t);});}
function showClientTab(t){["catalogo","miscuentas"].forEach(x=>{document.getElementById("tab-"+x).classList.toggle("active",x===t);document.getElementById("tbtn-"+x).classList.toggle("active",x===t);});if(t==="miscuentas")renderClientPurchases();}
const getProduct=id=>cachedProducts.find(p=>p.id===id);
const clientDebtOf=(uid,purchases)=>purchases.filter(p=>p.userId===uid).reduce((s,p)=>{const pr=getProduct(p.productId);return s+(pr?pr.price*p.qty:0);},0);
function renderAdmin(){
  const isHist=!isCurrentMonth(),lbl=viewMonthLabel(),purchases=viewPurchases,clients=cachedUsers.filter(u=>u.role==="cliente"),totalDebt=clients.reduce((s,c)=>s+clientDebtOf(c.id,purchases),0);
  document.getElementById("admin-month-label").textContent=lbl;
  const hb=isHist?`<span class="historic-badge">Histórico</span>`:"";
  document.getElementById("clients-section-title").innerHTML=`Clientes · ${lbl} ${hb}`;
  document.getElementById("compras-section-title").innerHTML=`Compras · ${lbl} ${hb}`;
  document.getElementById("admin-metrics").innerHTML=
    `<div class="metric"><div class="metric-label">Clientes</div><div class="metric-val">${clients.length}</div></div>
     <div class="metric"><div class="metric-label">Compras · ${lbl}</div><div class="metric-val">${purchases.length}</div></div>
     <div class="metric ganancia-card"><div class="metric-label">💰 Ganancia del mes</div><div class="metric-val">${fmt(totalDebt)}</div></div>`;
  const cl=document.getElementById("admin-clients-list");
  cl.innerHTML=clients.length===0?`<div class="empty">Sin clientes registrados</div>`:
    `<table><tr><th>Cliente</th><th>Usuario</th><th>Compras</th><th>Deuda ${lbl}</th><th></th></tr>`+
    clients.map(c=>{const debt=clientDebtOf(c.id,purchases),badge=debt===0?"badge-green":debt>50000?"badge-red":"badge-amber",compras=purchases.filter(p=>p.userId===c.id).length;
      return `<tr><td><div style="display:flex;align-items:center;gap:9px;"><div class="initials">${initials(c.name)}</div>${c.name}</div></td><td style="color:var(--gray-muted);">${c.username}</td><td>${compras}</td><td><span class="badge ${badge}">${fmt(debt)}</span></td><td>${isHist?"":` <button class="btn-danger" onclick="deleteClient('${c.id}')">Eliminar</button>`}</td></tr>`;
    }).join("")+"</table>";
  document.getElementById("add-client-card").style.display=isHist?"none":"block";
  const pl=document.getElementById("admin-purchases-list");
  pl.innerHTML=clients.length===0?`<div class="empty">Sin clientes</div>`:
    clients.map(c=>{const cmp=purchases.filter(p=>p.userId===c.id),debt=clientDebtOf(c.id,purchases);
      return `<div class="client-block"><div class="client-header"><div class="initials">${initials(c.name)}</div><span style="font-weight:700;font-size:14px;">${c.name}</span><span class="badge ${debt===0?"badge-green":debt>50000?"badge-red":"badge-amber"}">${fmt(debt)}</span></div>
      ${cmp.length===0?`<div style="font-size:12px;color:var(--gray-muted);padding-left:46px;">Sin compras en ${lbl}</div>`:
        `<table style="margin-left:46px;width:calc(100% - 46px);"><tr><th>Producto</th><th>Cant.</th><th>Subtotal</th><th>Fecha</th>${isHist?"":"<th></th>"}</tr>`+
        cmp.map(p=>{const pr=getProduct(p.productId);return `<tr><td>${pr?pr.name:"–"}</td><td>${p.qty}</td><td>${pr?fmt(pr.price*p.qty):"–"}</td><td style="color:var(--gray-muted);">${p.date}</td>${isHist?"":` <td><button class="btn-danger" onclick="adminDelPurchase('${p.id}','${p.productId}',${p.qty})">×</button></td>`}</tr>`;}).join("")+"</table>"
      }</div>`;
    }).join("");
  const pt=document.getElementById("admin-products-list");
  pt.innerHTML=cachedProducts.length===0?`<div class="empty">Sin productos</div>`:
    `<table><tr><th>Imagen</th><th>Producto</th><th>Categoría</th><th>Precio</th><th>Stock</th><th>Ajustar</th><th></th></tr>`+
    cachedProducts.map(p=>{const sb=p.stock<=0?"badge-red":p.stock<=3?"badge-amber":"badge-green";
      return `<tr><td>${p.img?`<img src="${p.img}" style="width:44px;height:44px;object-fit:cover;border-radius:10px;border:1px solid var(--gray-border);" onerror="this.style.display='none'"/>`:
        `<div style="width:44px;height:44px;border-radius:10px;background:var(--blue-pale);display:flex;align-items:center;justify-content:center;font-size:20px;">🛒</div>`
      }</td><td style="font-weight:700;">${p.name}</td><td style="color:var(--gray-muted);">${p.cat}</td><td style="color:var(--blue);font-weight:800;">${fmt(p.price)}</td>
      <td><span class="badge ${sb}">${p.stock!==undefined?p.stock:"–"}</span></td>
      <td><div style="display:flex;align-items:center;gap:4px;"><input type="number" id="adj-${p.id}" value="0" style="width:55px;padding:5px 7px;font-size:12px;border:1.5px solid var(--gray-border);border-radius:8px;background:var(--gray-bg);color:var(--gray-text);outline:none;font-family:'Nunito',sans-serif;"/><button class="btn-stock" onclick="adjustStock('${p.id}')">+/−</button></div></td>
      <td><button class="btn-danger" onclick="deleteProduct('${p.id}')">Eliminar</button></td></tr>`;
    }).join("")+"</table>";
}
function renderCliente(){
  document.getElementById("client-welcome").textContent="Hola, "+currentUser.name+" · "+MONTHS[currentMonth]+" "+currentYear;
  document.getElementById("client-month-badge").textContent=MONTHS[currentMonth]+" "+currentYear;
  const grid=document.getElementById("client-product-grid");
  grid.innerHTML=cachedProducts.length===0?`<div class="empty">No hay productos disponibles</div>`:
    cachedProducts.map(p=>{const ag=p.stock!==undefined&&p.stock<=0;
      return `<div class="product-card${ag?" agotado":""}">
        ${ag?'<div class="agotado-banner">AGOTADO</div>':""}
        ${p.img?`<img class="product-img" src="${p.img}" alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"/><div class="product-img-placeholder" style="display:none;">🛒</div>`:`<div class="product-img-placeholder">🛒</div>`}
        <div class="product-info">
          <div class="product-cat">${p.cat}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-price">${fmt(p.price)}</div>
          ${ag?`<div style="font-size:12px;color:var(--danger);font-weight:700;margin-top:4px;">No disponible</div>`:
            `<div style="display:flex;align-items:center;gap:6px;margin-top:8px;">
              <input type="number" id="qty-${p.id}" value="1" min="1" max="${p.stock||999}" style="width:52px;padding:7px 8px;font-size:13px;border:1.5px solid var(--gray-border);border-radius:8px;background:var(--gray-bg);color:var(--gray-text);outline:none;font-family:'Nunito',sans-serif;font-weight:700;"/>
              <button class="btn-add" style="flex:1;padding:8px 10px;font-size:12px;" onclick="addPurchase('${p.id}')">Agregar</button>
            </div>`
          }
        </div>
      </div>`;
    }).join("");
  renderClientPurchases();
}
function renderClientPurchases(){
  if(!currentUser)return;
  const mp=cachedPurchases.filter(p=>p.userId===currentUser.id),total=clientDebtOf(currentUser.id,cachedPurchases);
  const list=document.getElementById("client-purchases-list");
  list.innerHTML=mp.length===0?`<div class="empty">No has registrado compras este mes</div>`:
    mp.map(p=>{const pr=getProduct(p.productId);
      return `<div class="purchase-row">
        <div><div style="font-size:13px;font-weight:700;">${pr?pr.name:"Producto eliminado"}</div><div style="font-size:12px;color:var(--gray-muted);margin-top:2px;">Cantidad: ${p.qty} · ${p.date}</div></div>
        <div style="display:flex;align-items:center;gap:10px;"><span style="font-size:14px;font-weight:800;color:var(--blue);">${pr?fmt(pr.price*p.qty):"–"}</span>
        <button class="btn-danger" onclick="deleteMyPurchase('${p.id}','${p.productId}',${p.qty})">×</button></div>
      </div>`;
    }).join("");
  document.getElementById("client-total-bar").innerHTML=`<span class="total-label">Total a pagar · ${MONTHS[currentMonth]}</span><span class="total-val">${fmt(total)}</span>`;
}
function addPurchase(productId){
  const pr=getProduct(productId);if(!pr)return;
  const qty=parseInt(document.getElementById("qty-"+productId)?.value)||1;
  if(pr.stock!==undefined&&qty>pr.stock){const al=document.getElementById("client-alert");al.innerHTML=`<div class="alert alert-error">Solo hay ${pr.stock} unidades disponibles</div>`;setTimeout(()=>al.innerHTML="",3000);return;}
  const batch=db.batch(),ref=db.collection("purchases").doc();
  batch.set(ref,{userId:currentUser.id,productId,qty,date:todayStr,monthKey:currentMonthKey});
  if(pr.stock!==undefined)batch.update(db.collection("products").doc(productId),{stock:pr.stock-qty});
  batch.commit().then(()=>{const idx=cachedProducts.findIndex(p=>p.id===productId);if(idx!==-1&&cachedProducts[idx].stock!==undefined)cachedProducts[idx].stock-=qty;
    const al=document.getElementById("client-alert");al.innerHTML=`<div class="alert alert-success">✓ ${pr.name} ×${qty} agregado a tu cuenta</div>`;setTimeout(()=>al.innerHTML="",2500);renderCliente();});
}
function deleteMyPurchase(id,productId,qty){const pr=getProduct(productId),batch=db.batch();batch.delete(db.collection("purchases").doc(id));if(pr&&pr.stock!==undefined)batch.update(db.collection("products").doc(productId),{stock:pr.stock+qty});batch.commit().then(()=>{if(pr&&pr.stock!==undefined){const idx=cachedProducts.findIndex(p=>p.id===productId);if(idx!==-1)cachedProducts[idx].stock+=qty;}renderCliente();});}
function adminDelPurchase(id,productId,qty){const pr=getProduct(productId),batch=db.batch();batch.delete(db.collection("purchases").doc(id));if(pr&&pr.stock!==undefined)batch.update(db.collection("products").doc(productId),{stock:pr.stock+qty});batch.commit().then(()=>{if(pr&&pr.stock!==undefined){const idx=cachedProducts.findIndex(p=>p.id===productId);if(idx!==-1)cachedProducts[idx].stock+=qty;}});}
function adjustStock(productId){const input=document.getElementById("adj-"+productId),delta=parseInt(input.value);if(isNaN(delta)||delta===0)return;const pr=getProduct(productId);if(!pr)return;const ns=Math.max(0,(pr.stock||0)+delta);db.collection("products").doc(productId).update({stock:ns}).then(()=>{const idx=cachedProducts.findIndex(p=>p.id===productId);if(idx!==-1)cachedProducts[idx].stock=ns;input.value=0;renderAdmin();});}
function addClient(){
  const name=document.getElementById("nc-name").value.trim(),username=document.getElementById("nc-user").value.trim().toLowerCase(),password=document.getElementById("nc-pass").value;
  const msg=document.getElementById("add-client-msg"),btn=document.getElementById("btn-add-client");
  msg.style.color="var(--danger)";
  if(!name||!username||!password){msg.textContent="Completa todos los campos";return;}
  if(cachedUsers.find(u=>u.username===username)){msg.textContent="Ese usuario ya existe";return;}
  if(password.length<6){msg.textContent="La contraseña debe tener mínimo 6 caracteres";return;}
  btn.disabled=true;btn.textContent="Creando...";msg.textContent="";
  secAuth.createUserWithEmailAndPassword(username+CLIENT_DOMAIN,password).then(cred=>{
    const newUser={id:cred.user.uid,name,username,role:"cliente",email:username+CLIENT_DOMAIN};
    return db.collection("users").doc(cred.user.uid).set(newUser).then(()=>secAuth.signOut()).then(()=>{
      cachedUsers.push(newUser);
      ["nc-name","nc-user","nc-pass"].forEach(i=>document.getElementById(i).value="");
      msg.style.color="var(--success)";msg.textContent="✓ Cliente \""+name+"\" creado correctamente";
      setTimeout(()=>msg.textContent="",3000);renderAdmin();});
  }).catch(e=>{msg.textContent=e.code==="auth/email-already-in-use"?"Ese usuario ya existe":"Error: "+e.message;})
  .finally(()=>{btn.disabled=false;btn.textContent="+ Agregar";});
}
function deleteClient(id){
  if(!confirm("¿Eliminar este cliente y todas sus compras?"))return;
  const toDel=cachedPurchases.filter(p=>p.userId===id),batch=db.batch();
  toDel.forEach(p=>batch.delete(db.collection("purchases").doc(p.id)));
  batch.delete(db.collection("users").doc(id));
  batch.commit().then(()=>{cachedUsers=cachedUsers.filter(u=>u.id!==id);renderAdmin();});
}
function addProduct(){
  const name=document.getElementById("np-name").value.trim(),price=parseFloat(document.getElementById("np-price").value),cat=document.getElementById("np-cat").value.trim(),stock=parseInt(document.getElementById("np-stock").value)||0,img=document.getElementById("np-img").value.trim();
  const err=document.getElementById("add-prod-error"),btn=document.getElementById("btn-add-prod");
  if(!name||!price||!cat){err.textContent="Completa nombre, precio y categoría";return;}
  btn.disabled=true;btn.textContent="Guardando...";
  const id=uid(),data={id,name,price,cat,stock};if(img)data.img=img;
  db.collection("products").doc(id).set(data).then(()=>{cachedProducts.push(data);err.textContent="";["np-name","np-price","np-cat","np-stock","np-img"].forEach(i=>document.getElementById(i).value="");renderAdmin();}).finally(()=>{btn.disabled=false;btn.textContent="+ Agregar";});
}
function deleteProduct(id){if(!confirm("¿Eliminar este producto?"))return;db.collection("products").doc(id).delete().then(()=>{cachedProducts=cachedProducts.filter(p=>p.id!==id);renderAdmin();});}
document.addEventListener("keydown",e=>{if(e.key==="Enter"&&document.getElementById("screen-login").style.display!=="none")doLogin();});
(async()=>{try{await seedProducts();await loadAll();}catch(e){console.error("Error:",e);}if(!mainAuth.currentUser)showScreen("screen-login");})();
</script>
</body>
